<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- 둥근 사각형 배경 (iOS·Android 마스크와 호환) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 도넛 베이스 링 -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="58"/>
  <!-- 도넛 활성 조각 (약 70%) -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="#ffffff" stroke-width="58"
          stroke-dasharray="608 260" stroke-dashoffset="0"
          transform="rotate(-90 256 256)"
          stroke-linecap="butt"/>
  <!-- 작은 강조 조각 (약 12%) -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="#fbbf24" stroke-width="58"
          stroke-dasharray="103 765" stroke-dashoffset="-608"
          transform="rotate(-90 256 256)"
          stroke-linecap="butt"/>
  <!-- 중앙 ₩ 심볼 -->
  <text x="256" y="290" font-size="120" text-anchor="middle" fill="#ffffff"
        font-weight="800" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif">₩</text>
</svg>
